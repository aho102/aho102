<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c0e"/>
      <stop offset="50%" style="stop-color:#141418"/>
      <stop offset="100%" style="stop-color:#0c0c0e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9f06b"/>
      <stop offset="100%" style="stop-color:#a8d94a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="260" fill="url(#bg)" rx="16"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#c9f06b" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="260"/><line x1="60" y1="0" x2="60" y2="260"/>
    <line x1="120" y1="0" x2="120" y2="260"/><line x1="180" y1="0" x2="180" y2="260"/>
    <line x1="240" y1="0" x2="240" y2="260"/><line x1="300" y1="0" x2="300" y2="260"/>
    <line x1="360" y1="0" x2="360" y2="260"/><line x1="420" y1="0" x2="420" y2="260"/>
    <line x1="480" y1="0" x2="480" y2="260"/><line x1="540" y1="0" x2="540" y2="260"/>
    <line x1="600" y1="0" x2="600" y2="260"/><line x1="660" y1="0" x2="660" y2="260"/>
    <line x1="720" y1="0" x2="720" y2="260"/><line x1="780" y1="0" x2="780" y2="260"/>
    <line x1="840" y1="0" x2="840" y2="260"/><line x1="900" y1="0" x2="900" y2="260"/>
    <line x1="0" y1="0" x2="900" y2="0"/><line x1="0" y1="52" x2="900" y2="52"/>
    <line x1="0" y1="104" x2="900" y2="104"/><line x1="0" y1="156" x2="900" y2="156"/>
    <line x1="0" y1="208" x2="900" y2="208"/><line x1="0" y1="260" x2="900" y2="260"/>
  </g>

  <!-- Glow orb -->
  <circle cx="750" cy="80" r="120" fill="#c9f06b" opacity="0.03" filter="url(#glow)"/>
  <circle cx="150" cy="200" r="80" fill="#c9f06b" opacity="0.02" filter="url(#glow)"/>

  <!-- Accent line top -->
  <rect x="60" y="42" width="60" height="3" rx="1.5" fill="url(#accent)" opacity="0.8"/>

  <!-- Name -->
  <text x="60" y="95" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="#e8e6e1" font-weight="400">
    Alina Maharjan
  </text>

  <!-- Tagline -->
  <text x="60" y="130" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" fill="#8a8a96" font-weight="300" letter-spacing="0.5">
    BICT Student · Aspiring Software Engineer · Creative Problem Solver
  </text>

  <!-- Divider -->
  <rect x="60" y="150" width="40" height="1" rx="0.5" fill="#2a2a34"/>

  <!-- Info pills -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="500">
    <!-- Location -->
    <rect x="60" y="168" width="130" height="28" rx="14" fill="#1c1c22" stroke="#2a2a34" stroke-width="1"/>
    <text x="82" y="186" fill="#8a8a96">📍 Lalitpur, Nepal</text>

    <!-- College -->
    <rect x="200" y="168" width="142" height="28" rx="14" fill="#1c1c22" stroke="#2a2a34" stroke-width="1"/>
    <text x="220" y="186" fill="#8a8a96">🎓 Virinchi College</text>

    <!-- Status -->
    <rect x="352" y="168" width="175" height="28" rx="14" fill="#c9f06b12" stroke="#c9f06b33" stroke-width="1"/>
    <text x="374" y="186" fill="#c9f06b">💻 Open to Opportunities</text>
  </g>

  <!-- Code decoration on right -->
  <g font-family="'Courier New', monospace" font-size="12">
    <text x="650" y="180" fill="#555560">const alina = {</text>
    <text x="665" y="196" fill="#c9f06b" opacity="0.7">passion: "building things",</text>
    <text x="665" y="212" fill="#8a8a96" opacity="0.7">status: "learning"</text>
    <text x="650" y="228" fill="#555560">};</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="256" width="900" height="4" fill="url(#accent)" opacity="0.15" rx="0"/>
</svg>
